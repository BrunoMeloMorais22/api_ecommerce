name: Testes API

on:
  push:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8

        env:
          MYSQL_ROOT_PASSWORD: passport
          MYSQL_DATABASE: api_ecommerce

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:

      - name: Clonar projeto
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Criar tabelas
        run: |
          mysql -h 127.0.0.1 -u root -ppassport api_ecommerce -e "

          CREATE TABLE usuarios(
            id INT NOT NULL AUTO_INCREMENT,
            nome VARCHAR(245) NOT NULL,
            email VARCHAR(245) NOT NULL,
            senha VARCHAR(245) NOT NULL,
            PRIMARY KEY(id)
          );

          CREATE TABLE produtos(
            id INT NOT NULL AUTO_INCREMENT,
            nome VARCHAR(245) NOT NULL,
            preco DECIMAL(10, 2),
            PRIMARY KEY(id)
          );

          CREATE TABLE carrinho(
            id INT NOT NULL AUTO_INCREMENT,
            usuario_id INT,
            produto_id INT,
            quantidade INT,
            PRIMARY KEY(id),
            FOREIGN KEY (usuario_id) REFERENCES usuarios(id),
            FOREIGN KEY (produto_id) REFERENCES produtos(id)
          );

          CREATE TABLE pedidos (
            id INT AUTO_INCREMENT PRIMARY KEY,
            usuario_id INT,
            total DECIMAL(10,2),
            FOREIGN KEY (usuario_id) REFERENCES usuarios(id)
          );

          "

      - name: Rodar testes
        run: npm test
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: passport
          DB_NAME: api_ecommerce
          JWT_SECRET: teste