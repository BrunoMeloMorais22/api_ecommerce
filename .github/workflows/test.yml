name: Testes API

on:
  push:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar projeto
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test

services:
  mysql:
    image: mysql:8

    env:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: api_ecommerce

    ports:
      - 3306:3306

    options: >-
      --health-cmd="mysqladmin ping"
      --health-interval=10s
      --health-timeout=5s
      --health-retries=3