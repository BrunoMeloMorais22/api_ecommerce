<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <form id="formLogin">
        <h2>Login</h2> <br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email..." required><br><br>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha..." required> <br><br>

        <button type="submit">Fazer Login</button>

        <div class="links-extras">
            <a href="/cadastro">Não tem uma conta? Faça seu cadastro</a> <br><br>
            <a href="/">Voltar ao menu principal</a><br><br>

            <div id="mensagem"></div>
        </div>
    </form>

    <script src="../javascript/login.js"></script>
</body>
</html>
