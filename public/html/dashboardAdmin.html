<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel administrativo</title>
</head>
<body>
    <form id="formProduto" enctype="multipart/form-data">
        
        <label for="nome">Nome do produto</label>
        <input type="text" id="nome" name="nome" placeholder="Nome do produto.." required> <br><br>

        <label for="preco">Preço do produto</label>
        <input type="number" id="preco" name="preco" step="0.01", min="0" placeholder="Preço do produto..." required> <br><br>
        
        <label for="estoque">Quantidade no estoque</label>
        <input type="number" id="estoque" name="estoque" placeholder="Quantidade no estoque" required> <br><br>

        <label for="descricao">Descrição do produto</label>
        <input type="text" id="descricao" name="descricao" placeholder="Descrição do produto" required> <br><br>
        
        <label for="imagem">Imagem do produto</label>
        <input type="file" id="imagem" name="imagem" placeholder="Imagem do produto" required> <br><br>

        <label for="categoria">Categoria do produto</label>
        <input type="text" id="categoria" name="categoria" placeholder="Categoria do produto"> <br><br>

        <button type="submit">Cadastrar produto</button>

        <div id="mensagem"></div>
    </form>

    <script src="../javascript/dashboardAdmin.js"></script>
</body>
</html>
