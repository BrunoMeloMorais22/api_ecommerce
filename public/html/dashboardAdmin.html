<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel administrativo</title>
    <link rel="stylesheet" href="../css/dashboardAdmin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <form id="formProduto" enctype="multipart/form-data">
        <a href="/"><i class="fa-solid fa-angle-left"></i></a>
        <h2>Cadastro de produtos</h2><br>

        <label for="nome">Nome do produto</label>
        <div class="input-group">
            <i class="fa-brands fa-product-hunt"></i>
            <input type="text" id="nome" name="nome" placeholder="Nome do produto.." required>
        </div> 

        
        <label for="preco">Preço do produto</label>

        <div class="input-group">
            <i class="fa-solid fa-tag"></i>
            <input type="number" id="preco" name="preco" step="0.01", min="0" placeholder="Preço do produto..." required>
        </div> 
        
        <label for="estoque">Quantidade no estoque</label>

        <div class="input-group">
            <i class="fa-solid fa-boxes-stacked"></i>
            <input type="number" id="estoque" name="estoque" placeholder="Quantidade no estoque" required>
        </div> 

        <label for="descricao">Descrição do produto</label>

        <div class="input-group">
            <i class="fa-solid fa-align-left"></i>
            <input type="text" id="descricao" name="descricao" placeholder="Descrição do produto" required>
        </div> 
        
        <label for="imagem">Imagem do produto</label>

        <div class="input-group">
            <i class="fa-solid fa-image"></i>
            <input type="file" id="imagem" name="imagem" placeholder="Imagem do produto" required>
        </div

        <label for="categoria">Categoria do produto</label>

        <div class="input-group">
            <i class="fa-solid fa-layer-group"></i>
            <input type="text" id="categoria" name="categoria" placeholder="Categoria do produto">
        </div> 

        <button type="submit">Cadastrar produto</button>

        <div id="mensagem"></div>
    </form>

    <script src="../javascript/dashboardAdmin.js"></script>
</body>
</html>
