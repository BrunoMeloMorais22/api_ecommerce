<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de cadastro</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
    <form id="formCadastro">
        <h2>Cadastro</h2> <br>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome..." required> <br><br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email..." required><br><br>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha..." required> <br><br>

        <button type="submit">Fazer Cadastro</button>

        <div class="links-extras">
            <a href="/login">Já tem uma conta? Faça login</a> <br><br>
            <a href="/">Voltar ao menu principal</a><br><br>

            <div id="mensagem"></div>
        </div>
    </form>

    <script src="../javascript/cadastro.js"></script>
</body>
</html>
